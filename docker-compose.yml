services:
  postgres:
    image: postgres:16-alpine
    container_name: zanvara-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: zanvara
      POSTGRES_PASSWORD: zanvara
      POSTGRES_DB: zanvara
    volumes:
      - zanvara_postgres_data:/var/lib/postgresql/data

volumes:
  zanvara_postgres_data:
